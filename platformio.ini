; ============================================================
;  ESP8266 + MPU6050 (国产克隆, 地址 0x70) 角度读取
;  框架: Arduino  |  使用 DMP (数字运动处理器)
; ============================================================
;
;  接线 (NodeMCU / Wemos D1 默认 I2C 引脚):
;    MPU6050 VCC -> 3V3
;    MPU6050 GND -> GND
;    MPU6050 SCL -> D1 (GPIO5)
;    MPU6050 SDA -> D2 (GPIO4)
;
;  如果你的板子不是 nodemcuv2 (例如 Wemos D1 mini),
;  把 board 改成 d1_mini 即可。
; ============================================================

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -I${PROJECT_DIR}/DMP
